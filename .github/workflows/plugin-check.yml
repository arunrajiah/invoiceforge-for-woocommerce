name: Plugin Check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  plugin-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Verify vendor/mpdf is present
        run: |
          if [ ! -d "vendor/mpdf/mpdf" ]; then
            echo "::error::vendor/mpdf/mpdf is missing. Composer install may have failed."
            exit 1
          fi

      - name: Verify readme.txt stable tag matches plugin header version
        run: |
          README_TAG=$(grep -oP '(?<=^Stable tag: )[\d.]+' readme.txt | head -1)
          HEADER_VERSION=$(grep -oP '(?<= \* Version:           )[\d.]+' invoiceforge-for-woocommerce.php | head -1)
          if [ "$README_TAG" != "$HEADER_VERSION" ]; then
            echo "::error::Stable tag ($README_TAG) does not match plugin header version ($HEADER_VERSION)"
            exit 1
          fi
          echo "Version check passed: $HEADER_VERSION"

      - name: Run WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: './'
          exclude-directories: 'vendor,tests,node_modules,build,docs'
          categories: 'plugin_repo,security,general,accessibility,performance,i18n'

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Plugin Check failed for InvoiceForge. See workflow output. Refer to `docs/plugin-check-warnings.md` for InvoiceForge-specific fixes.'
            })
